services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production.example
        required: true
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: launcher_bot
      POSTGRES_USER: launcherbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launcherbot -d launcher_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    image: ${API_IMAGE:-launcher-bot-api:prod}
    restart: unless-stopped
    env_file:
      - path: .env.production.example
        required: true
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BIND_HOST: 0.0.0.0
      DATABASE_URL: postgresql://launcherbot:${POSTGRES_PASSWORD:-replace_password}@postgres:5432/launcher_bot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build:
      context: .
      target: bot
    image: ${BOT_IMAGE:-launcher-bot-bot:prod}
    restart: unless-stopped
    env_file:
      - path: .env.production.example
        required: true
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      API_BASE_URL: https://www.kromabot.com/api
      DATABASE_URL: postgresql://launcherbot:${POSTGRES_PASSWORD:-replace_password}@postgres:5432/launcher_bot
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_URL: /api
    image: ${WEB_IMAGE:-launcher-bot-web:prod}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
